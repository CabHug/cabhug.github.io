<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" id="cf_meta_description" content="">
  <meta name="author" content="Hugo Andres Cabrera">
  <title id="cf_page_title">Certificaciones</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ============================================================
       VARIABLES — idénticas a case-study.html para mantener
       coherencia visual entre las dos vistas dinámicas del sitio.
       ============================================================ */
    :root {
      --bg-main:        #f0f4f8;
      --bg-card:        #ffffff;
      --text-primary:   #1e293b;
      --text-secondary: #475569;
      --text-muted:     #64748b;
      --accent:         #1d4ed8;
      --accent-hover:   #1e40af;
      --border:         #cbd5e1;
      --badge-bg:       #dbeafe;
      --badge-text:     #1d4ed8;
      --skill-bar-fill: linear-gradient(90deg, #1d4ed8, #60a5fa);
      --shadow:         0 4px 6px -1px rgba(29,78,216,.08), 0 2px 4px -1px rgba(29,78,216,.05);
      --shadow-hover:   0 10px 15px -3px rgba(29,78,216,.12), 0 4px 6px -2px rgba(29,78,216,.06);
    }
    [data-theme="dark"] {
      --bg-main:        #0f172a;
      --bg-card:        #1e293b;
      --text-primary:   #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted:     #94a3b8;
      --accent:         #38bdf8;
      --accent-hover:   #7dd3fc;
      --border:         #334155;
      --badge-bg:       rgba(56,189,248,.15);
      --badge-text:     #38bdf8;
      --skill-bar-fill: linear-gradient(90deg, #1d4ed8, #38bdf8);
      --shadow:         0 4px 6px -1px rgba(0,0,0,.25);
      --shadow-hover:   0 10px 15px -3px rgba(0,0,0,.35);
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      transition: background-color .3s, color .3s, border-color .3s;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Toolbar (idéntica a case-study.html) ── */
    .toolbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-main);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: .875rem 2rem;
      display: flex; justify-content: space-between; align-items: center; gap: .75rem;
    }
    .toolbar-left  { display: flex; align-items: center; gap: .75rem; }
    .toolbar-right { display: flex; align-items: center; gap: .75rem; }

    /* ── Buttons ── */
    .btn {
      background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border); padding: .5rem 1rem;
      border-radius: 8px; font-family: inherit; font-weight: 600;
      font-size: .875rem; cursor: pointer;
      display: inline-flex; align-items: center; gap: .5rem;
      box-shadow: var(--shadow); text-decoration: none; white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); text-decoration: none; }
    .btn-primary { background: var(--accent); color: #fff; border: none; }
    .btn-primary:hover { background: var(--accent-hover); color: #fff; transform: translateY(-1px); }

    /* ── Layout (mismo ancho / contenedor que case-study.html) ── */
    .cs-container {
      max-width: 1100px;
      margin: 2.5rem auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Banner (mismo header visual que case-study.html) ── */
    .cs-banner {
      border-radius: 16px; overflow: hidden;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .cs-banner img {
      width: 100%; display: block;
      max-height: 260px; object-fit: cover; object-position: center;
    }

    /* ── Hero de la vista de certificaciones ── */
    .cs-hero {
      background: var(--bg-card); border-radius: 16px;
      padding: 2.25rem; border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .cs-title {
      font-size: 2rem; font-weight: 800; line-height: 1.2; margin-bottom: .75rem;
      background: var(--skill-bar-fill);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .cs-summary { color: var(--text-secondary); font-size: .95rem; line-height: 1.75; }

    /* ── Filtro de categorías ── */
    .cf-filters {
      display: flex; flex-wrap: wrap; gap: .6rem; margin-top: 1.5rem;
    }
    .cf-filter-btn {
      background: var(--bg-main); color: var(--text-secondary);
      border: 1px solid var(--border); padding: .5rem 1rem;
      border-radius: 999px; font-family: inherit; font-weight: 600;
      font-size: .82rem; cursor: pointer; display: inline-flex; align-items: center; gap: .45rem;
    }
    .cf-filter-btn i { font-size: .78rem; }
    .cf-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cf-filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Secciones por categoría ── */
    .cf-category-block { display: flex; flex-direction: column; gap: 1.25rem; }
    .cf-category-title {
      font-size: 1.1rem; font-weight: 700; color: var(--text-primary);
      display: flex; align-items: center; gap: .6rem;
    }
    .cf-category-title i {
      width: 2.25rem; height: 2.25rem; border-radius: 8px;
      background: var(--badge-bg); color: var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .cf-category-count {
      font-size: .78rem; font-weight: 700; color: var(--text-muted);
      background: var(--bg-card); border: 1px solid var(--border);
      padding: .15rem .55rem; border-radius: 999px; margin-left: .25rem;
    }

    /* ============================================================
       CUADRÍCULA DE CERTIFICADOS — cajas con bordes redondeados
       y hover elegante
       ============================================================ */
    .cf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }
    .cf-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
      box-shadow: var(--shadow);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      position: relative; overflow: hidden;
    }
    .cf-card::before {
      content: ""; position: absolute; inset: 0 0 auto 0; height: 3px;
      background: var(--skill-bar-fill);
      transform: scaleX(0); transform-origin: left; transition: transform .3s ease;
    }
    .cf-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }
    .cf-card:hover::before { transform: scaleX(1); }

    .cf-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: .75rem; }
    .cf-card-icon {
      width: 2.75rem; height: 2.75rem; border-radius: 10px; flex-shrink: 0;
      background: var(--badge-bg); color: var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
      transition: background .25s, color .25s;
    }
    .cf-card:hover .cf-card-icon { background: var(--accent); color: #fff; }

    .cf-card-name { font-size: 1rem; font-weight: 700; color: var(--text-primary); line-height: 1.4; }
    .cf-card-issuer {
      font-size: .78rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .03em;
      display: flex; align-items: center; gap: .3rem;
    }
    .cf-card-desc { font-size: .85rem; color: var(--text-secondary); line-height: 1.6; flex: 1; }
    .cf-card-meta { display: flex; flex-wrap: wrap; gap: .4rem; }
    .cf-card-badge {
      background: var(--badge-bg); color: var(--badge-text);
      padding: .18rem .55rem; border-radius: 6px; font-size: .72rem; font-weight: 700;
    }
    .cf-card-foot { margin-top: auto; display: flex; justify-content: flex-end; }
    .cf-card-foot .btn { padding: .45rem .9rem; font-size: .8rem; }

    /* ── Estado vacío / no encontrado ── */
    .cf-empty, .cf-loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; min-height: 40vh; text-align: center; color: var(--text-muted);
      padding: 3rem 2rem;
    }
    .cf-empty i, .cf-loading i { font-size: 2.5rem; color: var(--accent); opacity: .6; }
    .cf-loading i { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Animación de entrada ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .cs-fade { animation: fadeUp .45s ease both; }

    /* ── Footer ── */
    footer {
      margin-top: 2rem; padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
      text-align: center; color: var(--text-muted);
      font-size: .78rem; font-weight: 600; letter-spacing: .02em;
    }
    footer span { color: var(--accent); }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .cs-container { margin: 1rem auto; padding: 0 1rem; }
      .cs-hero { padding: 1.5rem; }
      .cs-title { font-size: 1.45rem; }
      .toolbar { padding: .75rem 1rem; }
      .toolbar-left .btn span,
      .toolbar-right .btn span { display: none; }
      .cf-grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cs-fade, .cf-card { animation: none; transition: none; }
    }
  </style>
</head>
<body data-theme="light">

  <!-- ── Toolbar (misma estructura que case-study.html) ── -->
  <div class="toolbar" role="navigation" aria-label="Controles de página">
    <div class="toolbar-left">
      <a href="index.html" class="btn" id="btn_back" aria-label="Volver al portafolio">
        <i class="fas fa-arrow-left" aria-hidden="true"></i>
        <span id="btn_back_text">Portafolio</span>
      </a>
    </div>
    <div class="toolbar-right">
      <button class="btn" id="themeToggle" onclick="toggleTheme()" aria-label="Cambiar tema">
        <i class="fas fa-moon" id="themeIcon" aria-hidden="true"></i>
        <span id="themeText">Modo Oscuro</span>
      </button>
      <button class="btn" onclick="toggleLanguage()" aria-label="Cambiar idioma">
        <i class="fas fa-globe" aria-hidden="true"></i>
        <span id="langText">EN</span>
      </button>
    </div>
  </div>

  <!-- ── Main content: injected by certifications.js ── -->
  <div class="cs-container" id="cf_root">
    <div class="cf-loading">
      <i class="fas fa-circle-notch" aria-hidden="true"></i>
      <span id="loading_text">Cargando certificaciones…</span>
    </div>
  </div>

  <footer id="cf_footer">
    <span>Hugo Cabrera</span> · Data Solutions
  </footer>

  <script src="certifications.js"></script>
</body>
</html>
