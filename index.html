<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"    id="meta_description"  content="">
  <meta name="author"         id="meta_author"        content="Hugo Andres Cabrera">
  <meta name="keywords"       id="meta_keywords"      content="">
  <meta property="og:title"   id="meta_og_title"      content="">
  <meta property="og:type"    content="profile">
  <title id="page_title">Portafolio · Hugo Cabrera</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ============================================================
       VARIABLES DE COLOR Y TEMA
       ============================================================ */
    :root {
      /* LIGHT MODE */
      --bg-main:        #f8fafc;
      --bg-card:        #ffffff;
      --text-primary:   #0a225a;
      --text-secondary: #334155;
      --text-muted:     #64748b;
      --accent:         #1d4ed8;
      --accent-hover:   #1e40af;
      --border:         #e2e8f0;
      --badge-bg:       #f1f5f9;
      --badge-text:     #0f172a;
      --shadow:         0 1px 3px 0 rgba(15,23,42,.05), 0 1px 2px 0 rgba(15,23,42,.03);
      --shadow-hover:   0 0 0 2px var(--accent), 0 4px 16px -4px rgba(29,78,216,.18);
      --radius-card:    12px;
      --radius-badge:   6px;
      --max-width:      1000px;
      /* Validation box */
      --val-bg:         rgba(29,78,216,.06);
      --val-border:     rgba(29,78,216,.22);
      --val-icon-public: #16a34a;
      --val-icon-conf:  #b45309;
    }

    /* DARK MODE — colores con buen contraste, sin azules eléctricos */
    [data-theme="dark"] {
      --bg-main:        #0d1117;
      --bg-card:        #161b22;
      --text-primary:   #e6edf3;
      --text-secondary: #b0bec8;
      --text-muted:     #768390;
      --accent:         #79c0ff;    /* azul suave legible sobre oscuro */
      --accent-hover:   #a5d6ff;
      --border:         #30363d;
      --badge-bg:       #21262d;
      --badge-text:     #cdd9e5;
      --shadow:         0 0 0 1px rgba(240,246,252,.1);
      --shadow-hover:   0 0 0 2px var(--accent), 0 4px 16px -4px rgba(121,192,255,.2);
      /* Validation box */
      --val-bg:         rgba(121,192,255,.07);
      --val-border:     rgba(121,192,255,.2);
      --val-icon-public: #3fb950;
      --val-icon-conf:  #d29922;
    }

    html, body {
      background-color: var(--bg-main) !important;
      color: var(--text-primary) !important;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      transition: background-color .25s ease, color .25s ease, border-color .25s ease, box-shadow .25s ease;
    }
    /* Excluir transform de la transición global para no interferir con hover preciso */
    .project-card, .cert-cat-card, .highlight-card, .lang-item, .soft-card, .skill-card {
      transition: background-color .25s ease, color .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(248,250,252,.85);
      backdrop-filter: saturate(180%) blur(8px);
      border-bottom: 1px solid var(--border);
      padding: .75rem 2rem;
      display: flex; justify-content: flex-end; align-items: center; gap: .75rem;
    }
    [data-theme="dark"] .toolbar { background: rgba(13,17,23,.85); }

    /* ── Botones ── */
    .btn {
      background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border); padding: .5rem 1rem;
      border-radius: var(--radius-badge); font-family: inherit; font-weight: 500;
      font-size: .875rem; cursor: pointer;
      display: inline-flex; align-items: center; gap: .5rem;
      box-shadow: var(--shadow); text-decoration: none; white-space: nowrap;
    }
    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--shadow-hover);
    }
    .btn-primary { background: var(--text-primary); color: var(--bg-main); border: 1px solid var(--text-primary); }
    .btn-primary:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Layout ── */
    .container {
      max-width: var(--max-width); margin: 0 auto;
      padding: 0 2rem 5rem 2rem;
      display: flex; flex-direction: column; gap: 5rem;
    }
    section { display: flex; flex-direction: column; gap: 1.5rem; }
    .section-title {
      font-size: 1.25rem; font-weight: 700; color: var(--text-primary);
      letter-spacing: -.02em; display: flex; align-items: center; gap: .5rem;
    }

    /* ── Hero ── */
    .hero-container { padding-top: 4rem; display: flex; flex-direction: column; gap: 1.5rem; align-items: flex-start; }
    /* Portada estilo banner (como el cover de LinkedIn).
       Si PORTFOLIO_DATA.contact.cover tiene una URL, se muestra esa imagen;
       si no, se ve este degradado por defecto. Se oculta en teléfono
       (ver @media max-width: 600px) dejando solo el nombre/título. */
    .hero-cover {
      width: 100%; aspect-ratio: 4.5 / 1; min-height: 140px;
      border-radius: var(--radius-card); overflow: hidden;
      border: 1px solid var(--border); box-shadow: var(--shadow);
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,.09) 0 2px, transparent 2px 16px),
        linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
    }
    .hero-cover-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-name { font-size: 2.5rem; font-weight: 800; letter-spacing: -.04em; line-height: 1.1; }
    .hero-title { font-size: 1.25rem; font-weight: 500; color: var(--text-secondary); letter-spacing: -.01em; max-width: 600px; }
    .hero-links { display: flex; flex-wrap: wrap; gap: .75rem; margin-top: .5rem; }

    /* ── Highlight cards ── */
    .about-text { font-size: 1rem; color: var(--text-secondary); max-width: 800px; line-height: 1.6; text-align: justify; }
    .highlight-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-top: .5rem; }
    .highlight-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card);
      padding: 1.25rem; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: .25rem;
    }
    .highlight-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
    .highlight-card:hover .highlight-val { color: var(--accent); }
    .highlight-val { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); letter-spacing: -.03em; }
    .highlight-lbl { font-size: .815rem; font-weight: 500; color: var(--text-muted); }

    /* ============================================================
       CARRUSELES INFINITOS
       ============================================================ */
    .carousel-outer {
      position: relative; margin: 0 -2rem; padding: 0 2rem;
    }
    .carousel-track {
      display: flex; gap: 1.25rem;
      overflow-x: auto; overflow-y: hidden;
      scroll-snap-type: x proximity;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 1.25rem;
      scrollbar-width: none;            /* Firefox */
    }
    .carousel-track::-webkit-scrollbar { display: none; }  /* Chrome/Safari/Edge */
    .carousel-track > * { scroll-snap-align: start; }
    /* Cuando hay pocas tarjetas y ya caben todas, se centran en vez de
       quedar pegadas a la izquierda como si faltara desplazar */
    .carousel-track.is-centered { justify-content: center; }

    /* Botones de carrusel */
    .carousel-btn {
      position: absolute; top: calc(50% - .625rem); transform: translateY(-50%);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-primary); border-radius: 50%; width: 2.5rem; height: 2.5rem;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: var(--shadow); z-index: 10;
    }
    .carousel-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--shadow-hover); }
    .carousel-btn.prev { left: .25rem; }
    .carousel-btn.next { right: .25rem; }

    /* ============================================================
       PROJECT CARDS — sin transform en hover
       ============================================================ */
    .project-card {
      flex: 0 0 420px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card);
      padding: 1.5rem; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 1rem;
      /* NO transform — solo borde y sombra */
    }
    .project-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
    .project-header { display: flex; flex-direction: column; gap: .15rem; }
    .project-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -.01em; }
    .project-company { font-size: .85rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; }
    .project-body { font-size: .875rem; color: var(--text-secondary); display: flex; flex-direction: column; gap: .5rem; flex: 1; }
    .project-body strong { color: var(--text-primary); }
    .project-actions { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: auto; padding-top: .5rem; }

    /* ── Caja de validación de código ── */
    .project-validation {
      display: flex; align-items: flex-start; gap: .6rem;
      background: var(--val-bg);
      border: 1px solid var(--val-border);
      border-radius: var(--radius-badge);
      padding: .6rem .8rem;
      font-size: .8rem;
    }
    .val-icon {
      font-size: .9rem; margin-top: .05rem; flex-shrink: 0;
    }
    .val-icon.public { color: var(--val-icon-public); }
    .val-icon.confidential { color: var(--val-icon-conf); }
    .val-text { display: flex; flex-direction: column; gap: .15rem; }
    .val-label {
      font-weight: 700; font-size: .72rem; letter-spacing: .04em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .val-title { font-weight: 600; color: var(--text-primary); line-height: 1.3; }

    /* ── Caja de referencias ── */
    .project-refs {
      background: var(--badge-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-badge);
      padding: .65rem .85rem;
      display: flex; flex-direction: column; gap: .4rem;
    }
    .project-refs-title {
      font-size: .7rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .05em;
      display: flex; align-items: center; gap: .3rem;
    }
    .project-refs-title i { color: var(--accent); font-size: .7rem; }
    .project-refs-list { display: flex; flex-wrap: wrap; gap: .5rem; }
    .project-refs-list a {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .8rem; font-weight: 600; color: var(--text-secondary); text-decoration: none;
      padding: .2rem .5rem; border-radius: var(--radius-badge);
      border: 1px solid var(--border); background: var(--bg-card);
    }
    .project-refs-list a:hover { border-color: var(--accent); color: var(--accent); }
    .project-refs-list a i { font-size: .72rem; color: var(--accent); }

    /* Badges en tarjetas */
    .badges-container { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .25rem; }
    .badge {
      background: var(--badge-bg); color: var(--badge-text); border: 1px solid var(--border);
      padding: .2rem .55rem; border-radius: var(--radius-badge); font-size: .73rem; font-weight: 600;
    }

    /* ── Skills ── */
    .skills-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .skill-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card);
      padding: 1.75rem; box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 1.5rem; height: 100%;
    }
    .skill-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
    .skills-subtitle {
      font-size: 1.1rem; font-weight: 700; color: var(--text-primary);
      display: flex; align-items: center; gap: .5rem;
      padding-bottom: .5rem; border-bottom: 1px solid var(--border);
    }
    .skill-group-container { display: flex; flex-direction: column; gap: .75rem; }
    .skill-group-label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
    .skill-tags { display: flex; flex-wrap: wrap; gap: .4rem; }
    .skill-tag {
      background: var(--badge-bg); color: var(--badge-text); border: 1px solid var(--border);
      padding: .25rem .6rem; border-radius: var(--radius-badge); font-size: .82rem; font-weight: 500;
    }
    .skill-tag:hover { border-color: var(--accent); color: var(--accent); }
    .skill-tag.highlight { background: var(--accent); color: #fff; border-color: var(--accent); }
    .skill-tag.highlight:hover { background: var(--accent-hover); }

    .soft-card-grid { display: flex; flex-direction: column; gap: .75rem; }
    .soft-card {
      background: var(--bg-main); border: 1px solid var(--border); border-radius: var(--radius-badge);
      padding: 1rem; display: flex; gap: .75rem; align-items: start;
    }
    .soft-card:hover { border-color: var(--accent); }
    .soft-card i { color: var(--accent); font-size: 1rem; margin-top: .15rem; }
    .soft-card-content { display: flex; flex-direction: column; gap: .15rem; }
    .soft-card-title { font-size: .9rem; font-weight: 600; color: var(--text-primary); }
    .soft-card-desc { font-size: .82rem; color: var(--text-muted); }

    /* ── Idiomas ── */
    .languages-wrapper { display: flex; flex-wrap: wrap; gap: 1rem; }
    .lang-item {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card);
      padding: 1rem 1.5rem; box-shadow: var(--shadow);
      font-size: .95rem; color: var(--text-secondary); font-weight: 500;
      display: flex; align-items: center; gap: .75rem; flex: 1; min-width: 200px;
    }
    .lang-item:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
    .lang-item i { color: var(--accent); font-size: 1.1rem; }
    .lang-item strong { color: var(--text-primary); font-weight: 700; }

    /* ── Cert category cards (carrusel de categorías de certificaciones) ── */
    .cert-cat-card {
      flex: 0 0 260px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card);
      padding: 1.75rem 1.5rem; box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 1rem;
      cursor: pointer; text-decoration: none; color: inherit;
      appearance: none; font-family: inherit; text-align: left;
    }
    .cert-cat-card:hover, .cert-cat-card:focus-visible {
      border-color: var(--accent); box-shadow: var(--shadow-hover); outline: none;
    }
    .cert-cat-card:hover .cert-cat-icon, .cert-cat-card:focus-visible .cert-cat-icon {
      background: var(--accent); color: #fff;
    }
    .cert-cat-icon {
      width: 3rem; height: 3rem; border-radius: var(--radius-badge);
      background: var(--badge-bg); color: var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 1.25rem;
    }
    .cert-cat-title { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); letter-spacing: -.01em; }
    .cert-cat-desc { font-size: .85rem; color: var(--text-muted); line-height: 1.5; }
    .cert-cat-cta {
      margin-top: auto; font-size: .78rem; font-weight: 700; color: var(--accent);
      display: flex; align-items: center; gap: .35rem;
      text-transform: uppercase; letter-spacing: .04em;
    }

    /* ============================================================
       CTA — SIEMPRE RESALTADO, MÁS COMPACTO
       ============================================================ */
    .connect-cta {
      background: var(--bg-card);
      border: 2px solid var(--accent);        /* borde siempre visible */
      border-radius: var(--radius-card);
      padding: 2rem 2.5rem;                   /* más compacto (antes 3rem) */
      text-align: center;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent), var(--shadow);
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }
    [data-theme="dark"] .connect-cta {
      box-shadow: 0 0 0 4px rgba(121,192,255,.12), var(--shadow);
    }
    .connect-title { font-size: 1.75rem; font-weight: 800; letter-spacing: -.03em; }
    .connect-desc { font-size: .95rem; color: var(--text-secondary); max-width: 500px; }
    .connect-btn {
      background: var(--accent); color: #fff; border: 1px solid var(--accent);
      padding: .75rem 1.75rem; border-radius: var(--radius-badge);
      font-family: inherit; font-weight: 700; font-size: .95rem;
      display: inline-flex; align-items: center; gap: .6rem;
      text-decoration: none; box-shadow: var(--shadow);
    }
    .connect-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); box-shadow: var(--shadow-hover); }

    /* ── Footer ── */
    footer {
      margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 1rem; text-align: center;
    }
    .footer-note { font-size: .85rem; color: var(--text-muted); max-width: 700px; margin: 0 auto; line-height: 1.5; }
    .footer-brand { font-size: .9rem; font-weight: 700; color: var(--text-secondary); }
    .footer-legal { font-size: .8rem; color: var(--text-muted); }

    /* ── Responsive ── */
    @media (max-width: 850px) {
      .highlight-grid { grid-template-columns: repeat(2,1fr); }
      .skills-wrapper { grid-template-columns: 1fr; gap: 2rem; }
      .project-card { flex: 0 0 320px; }
      .cert-cat-card { flex: 0 0 240px; }
    }
    @media (max-width: 600px) {
      .container { padding: 0 1rem 3rem; gap: 4rem; }
      .toolbar { padding: .75rem 1rem; }
      .hero-cover { display: none; }
      .hero-name { font-size: 2rem; }
      .highlight-grid { grid-template-columns: 1fr; }
      .connect-cta { padding: 1.5rem 1rem; }
      .carousel-outer { margin: 0; padding: 0; }
      .carousel-btn { display: none !important; }
    }
  </style>
</head>

<!-- Inicio en modo OSCURO por defecto -->
<body data-theme="dark">

  <nav class="toolbar" role="navigation" aria-label="Controles de página">
    <button class="btn" id="themeToggle" onclick="toggleTheme()" aria-label="Cambiar tema">
      <i class="fas fa-sun" id="themeIcon" aria-hidden="true"></i>
      <span id="themeText">Modo Claro</span>
    </button>
    <button class="btn" onclick="toggleLanguage()" aria-label="Cambiar idioma">
      <i class="fas fa-globe" aria-hidden="true"></i>
      <span id="langText">EN</span>
    </button>
  </nav>

  <main class="container">

    <!-- 1. HERO -->
    <header class="hero-container" id="hero_section"></header>

    <!-- 2. ABOUT ME -->
    <section aria-labelledby="sec_profile">
      <h2 class="section-title">
        <i class="fas fa-user" aria-hidden="true"></i>
        <span id="sec_profile"></span>
      </h2>
      <p class="about-text" id="profile_desc"></p>
      <div class="highlight-grid" id="about_highlights"></div>
    </section>

    <!-- 3. FEATURED PROJECTS -->
    <section aria-labelledby="sec_projects">
      <h2 class="section-title">
        <i class="fas fa-star" aria-hidden="true"></i>
        <span id="sec_projects"></span>
      </h2>
      <div class="carousel-outer">
        <button class="carousel-btn prev" onclick="scrollCarousel('timeline_projects', -1)" aria-label="Anterior"><i class="fas fa-chevron-left"></i></button>
        <div class="carousel-track" id="timeline_projects"></div>
        <button class="carousel-btn next" onclick="scrollCarousel('timeline_projects', 1)" aria-label="Siguiente"><i class="fas fa-chevron-right"></i></button>
      </div>
    </section>

    <!-- 4. SKILLS -->
    <section aria-labelledby="sec_skills_heading">
      <h2 class="section-title">
        <i class="fas fa-bolt" aria-hidden="true"></i>
        <span id="sec_skills_heading"></span>
      </h2>
      <div class="skills-wrapper" id="skills_section_wrapper"></div>
    </section>

    <!-- 5. ENTERPRISE PROJECTS -->
    <section aria-labelledby="sec_enterprise_projects">
      <h2 class="section-title">
        <i class="fas fa-briefcase" aria-hidden="true"></i>
        <span id="sec_enterprise_projects"></span>
      </h2>
      <div class="carousel-outer">
        <button class="carousel-btn prev" onclick="scrollCarousel('enterprise_projects_track', -1)" aria-label="Anterior"><i class="fas fa-chevron-left"></i></button>
        <div class="carousel-track" id="enterprise_projects_track"></div>
        <button class="carousel-btn next" onclick="scrollCarousel('enterprise_projects_track', 1)" aria-label="Siguiente"><i class="fas fa-chevron-right"></i></button>
      </div>
    </section>

    <!-- 6. LANGUAGES -->
    <section aria-labelledby="sec_lang_heading">
      <h2 class="section-title">
        <i class="fas fa-language" aria-hidden="true"></i>
        <span id="sec_lang_heading"></span>
      </h2>
      <div class="languages-wrapper" id="languages_section_wrapper"></div>
    </section>

    <!-- 7. CERTIFICATIONS -->
    <section aria-labelledby="sec_certs_heading">
      <h2 class="section-title">
        <i class="fas fa-certificate" aria-hidden="true"></i>
        <span id="sec_certs_heading"></span>
      </h2>
      <div class="carousel-outer">
        <button class="carousel-btn prev" onclick="scrollCarousel('certs_categories_track', -1)" aria-label="Anterior"><i class="fas fa-chevron-left"></i></button>
        <div class="carousel-track" id="certs_categories_track"></div>
        <button class="carousel-btn next" onclick="scrollCarousel('certs_categories_track', 1)" aria-label="Siguiente"><i class="fas fa-chevron-right"></i></button>
      </div>
    </section>

    <!-- 8. CTA -->
    <section id="connect_section"></section>

    <!-- FOOTER -->
    <footer role="contentinfo" id="site_footer"></footer>

  </main>

  <script>
  /* ============================================================

  let currentLang  = localStorage.getItem('lang')  || 'es';
  let currentTheme = 'dark'; /* OSCURO POR DEFECTO — cada carga/recarga de la página inicia en oscuro */

  /* Guardamos referencia de cada carrusel para poder re-evaluar sus
     flechas (mostrar/ocultar) al redimensionar la ventana */
  const carouselRegistry = {}; // trackId -> { items, renderFn }

  /* ============================================================
     CARRUSEL NORMAL (scroll nativo, sin loop infinito)
     - Sin clones, sin transform manual, sin listeners de transitionend.
     - El navegador maneja el scroll y el snap; las flechas solo hacen
       scrollBy() una tarjeta a la vez.
     - Si hay pocas tarjetas y ya caben todas en el ancho visible, se
       centran y se ocultan las flechas (no hay nada que desplazar).
     - En cuanto no quepan todas, aparece el carrusel normal con sus
       flechas de desplazamiento.
     ============================================================ */
  function renderCarousel(trackId, items, renderFn) {
    const track = document.getElementById(trackId);
    if (!track || !items.length) return;

    carouselRegistry[trackId] = { items, renderFn };

    track.innerHTML = items.map(item => renderFn(item, false)).join('');
    track.scrollLeft = 0;

    updateCarouselArrows(trackId);
  }

  function updateCarouselArrows(trackId) {
    const track = document.getElementById(trackId);
    if (!track) return;
    const outer   = track.closest('.carousel-outer') || track.parentElement;
    const prevBtn = outer.querySelector('.carousel-btn.prev');
    const nextBtn = outer.querySelector('.carousel-btn.next');

    const canScroll = track.scrollWidth > track.clientWidth + 4;
    if (prevBtn) prevBtn.style.display = canScroll ? '' : 'none';
    if (nextBtn) nextBtn.style.display = canScroll ? '' : 'none';

    /* Pocas tarjetas que ya caben completas → se centran.
       Suficientes tarjetas para desbordar → carrusel normal con flechas. */
    track.classList.toggle('is-centered', !canScroll);
  }

  function scrollCarousel(trackId, direction) {
    const track = document.getElementById(trackId);
    if (!track) return;
    const firstCard = track.children[0];
    const cardWidth = firstCard ? firstCard.getBoundingClientRect().width : 300;
    const cs  = getComputedStyle(track);
    const gap = parseFloat(cs.columnGap || cs.gap) || 20;
    track.scrollBy({ left: direction * (cardWidth + gap), behavior: 'smooth' });
  }

  /* Al cambiar el tamaño de ventana, re-evaluamos si cada carrusel
     necesita flechas (debounced) */
  let carouselResizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(carouselResizeTimer);
    carouselResizeTimer = setTimeout(() => {
      Object.keys(carouselRegistry).forEach(trackId => updateCarouselArrows(trackId));
    }, 200);
  });

      <div class="skill-group-container">
        <span class="skill-group-label">${currentLang === 'es' ? s.label_es : s.label_en}</span>
        <div class="skill-tags">${s.tags.map(t => `<span class="skill-tag${t.highlight ? ' highlight' : ''}">${t.name}</span>`).join('')}</div>
      </div>`).join('');
    const softHtml = PORTFOLIO_DATA.softSkills.map(s => `
      <div class="soft-card">
        <i class="${s.icon}"></i>
        <div class="soft-card-content">
          <span class="soft-card-title">${currentLang === 'es' ? s.name_es : s.name_en}</span>
          <span class="soft-card-desc">${currentLang === 'es' ? s.desc_es : s.desc_en}</span>
        </div>
      </div>`).join('');
    document.getElementById('skills_section_wrapper').innerHTML = `
      <div class="skill-card">
        <h3 class="skills-subtitle"><i class="fas fa-laptop-code"></i> ${PORTFOLIO_DATA.ui.tab_hard[currentLang]}</h3>
        ${hardHtml}
      </div>
      <div class="skill-card">
        <h3 class="skills-subtitle"><i class="fas fa-users"></i> ${PORTFOLIO_DATA.ui.tab_soft[currentLang]}</h3>
        <div class="soft-card-grid">${softHtml}</div>
      </div>`;

    /* 5. ENTERPRISE PROJECTS — carrusel */
    document.getElementById('sec_enterprise_projects').textContent = PORTFOLIO_DATA.ui.title_ent_projects[currentLang];
    renderCarousel('enterprise_projects_track', PORTFOLIO_DATA.enterprise_projects,
      (p, isClone) => renderProjectCard(p, isClone));

    /* 6. LANGUAGES */
    document.getElementById('sec_lang_heading').textContent = PORTFOLIO_DATA.ui.title_languages[currentLang];
    document.getElementById('languages_section_wrapper').innerHTML = PORTFOLIO_DATA.languages.map(l => `
      <div class="lang-item">
        <i class="fas fa-check-circle"></i>
        <span><strong>${currentLang === 'es' ? l.name_es : l.name_en}:</strong> ${currentLang === 'es' ? l.level_es : l.level_en}</span>
      </div>`).join('');

    /* 7. CERTS — carrusel de categorías (cada tarjeta lleva a certifications.html) */
    document.getElementById('sec_certs_heading').textContent = PORTFOLIO_DATA.ui.title_certs[currentLang];
    renderCarousel('certs_categories_track', PORTFOLIO_DATA.certCategories,
      (c, isClone) => renderCertCategoryCard(c, isClone));

    /* 8. CTA */
    const linkedinUrl = (PORTFOLIO_DATA.contact.links.find(l => l.icon === 'fab fa-linkedin') || {}).url || '#';
    document.getElementById('connect_section').innerHTML = `
      <div class="connect-cta">
        <h2 class="connect-title">${PORTFOLIO_DATA.ui.connect_cta_title[currentLang]}</h2>
        <a href="${linkedinUrl}" target="_blank" rel="noopener" class="connect-btn" aria-label="${PORTFOLIO_DATA.ui.connect_cta_btn_aria[currentLang]}">
          <i class="fab fa-linkedin" aria-hidden="true"></i>
          ${PORTFOLIO_DATA.ui.connect_cta_btn[currentLang]}
        </a>
      </div>`;

    /* FOOTER */
    document.getElementById('site_footer').innerHTML = `
      <p class="footer-note">${PORTFOLIO_DATA.ui.footer_note[currentLang]}</p>
      <p class="footer-brand">${PORTFOLIO_DATA.contact.name} · Data Solutions</p>
      <p class="footer-legal">${PORTFOLIO_DATA.ui.footer_legal[currentLang]}</p>`;
  }

  function toggleTheme() {
    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
    renderPortfolio();
  }

  function toggleLanguage() {
    currentLang = currentLang === 'es' ? 'en' : 'es';
    localStorage.setItem('lang', currentLang);
    renderPortfolio();
  }

  document.addEventListener('DOMContentLoaded', renderPortfolio);
  </script>
</body>
</html>
